e<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meghawatt Admin | Kitchen Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f2f6; margin: 0; padding: 20px; }
        header { background-color: #003366; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .order-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #d4af37; }
        .order-header { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; }
        .location-badge { background-color: #e3f2fd; color: #0d47a1; padding: 5px 10px; border-radius: 4px; font-size: 0.85rem; font-weight: 600; margin-top: 10px; display: inline-block; }
        .complete-btn { width: 100%; background-color: #27ae60; color: white; border: none; padding: 10px; border-radius: 5px; margin-top: 15px; cursor: pointer; font-weight: 600; }
        .complete-btn:hover { background-color: #219150; }
        .no-orders { text-align: center; color: #747d8c; grid-column: 1 / -1; padding: 5px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <header>
        <h1>Meghawatt Resto — Kitchen Live Orders</h1>
        <button onclick="loadOrders()" style="background: white; color: #003366; border: none; padding: 10px 15px; font-weight: bold; border-radius: 4px; cursor: pointer;">🔄 Refresh Orders</button>
    </header>

    <div class="dashboard-grid" id="admin-orders-container">
    </div>

    <script>
        function loadOrders() {
            const container = document.getElementById('admin-orders-container');
            container.innerHTML = ''; // Clear out the grid
            
            // Fetch saved orders from the browser's memory
            const orders = JSON.parse(localStorage.getItem('restaurantOrders')) || [];

            if (orders.length === 0) {
                container.innerHTML = '<p class="no-orders">☕ No active orders right now. Kitchen is clear!</p>';
                return;
            }

            orders.forEach((order, index) => {
                const card = document.createElement('div');
                card.className = 'order-card';
                
                // Format the items array into a bulleted list text string
                const itemsList = order.items.map(item => `<li>${item}</li>`).join('');

                card.innerHTML = `
                    <div class="order-header">
                        <span>ID: ${order.orderId}</span>
                        <span style="color: #747d8c;">🕒 ${order.time}</span>
                    </div>
                    <ul style="padding-left: 20px; margin: 10px 0;">
                        ${itemsList}
                    </ul>
                    <div style="font-weight: 600; margin-top: 5px;">Total: KES ${order.total.toFixed(2)}</div>
                    <div class="location-badge">📍 ${order.location}</div>
                    <button class="complete-btn" onclick="clearSingleOrder(${index})">Mark Served / Delivered</button>
                `;
                container.appendChild(card);
            });
        }

        function clearSingleOrder(index) {
            let orders = JSON.parse(localStorage.getItem('restaurantOrders')) || [];
            orders.splice(index, 1); // Remove the selected order card
            localStorage.setItem('restaurantOrders', JSON.stringify(orders)); // Resave back to memory
            loadOrders(); // Refresh the display grid
        }

        // Load the orders automatically as soon as the admin opens the dashboard page
        window.onload = loadOrders;
    </script>
</body>
</html>
